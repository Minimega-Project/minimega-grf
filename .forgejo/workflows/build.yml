name: Build

on:
  push:
    branches:
      - '**'
    paths:
      - '**/*.java'
      - '**/*.gradle'
      - '**/*.kts'
      - '**/*.json'
      - '.forgejo/workflows/build.yml'
      - '**/*.xml'
    tags:
      - '!**'
  pull_request:
    branches:
      - '**'
    paths:
      - '**/*.java'
      - '**/*.gradle'
      - '**/*.kts'
      - '**/*.json'
      - '**/*.xml'

jobs:
  build:

    runs-on: technocality

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: https://github.com/actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      #    - name: Run Data Generation
      #      run: ./gradlew runDatagen
      #      env:
      #        CI: 'true'
      - name: Build artifacts
        run: ./gradlew build
      - name: Get build hash
        id: get-build-hash
        run: |
          echo "id=$(echo ${{forgejo.sha}} | cut -c 1-7)" >> $FORGEJO_OUTPUT
      - name: Get branch name
        id: get-branch
        shell: bash
        run: |
          echo "branch=${FORGEJO_HEAD_REF:-${FORGEJO_REF#refs/heads/}}" >> $FORGEJO_OUTPUT
      - name: Upload build artifacts
        uses: https://code.forgejo.org/forgejo/upload-artifact@v4
        with:
          name: legacy4j-combat-zones-${{steps.get-branch.outputs.branch}}-${{steps.get-build-hash.outputs.id}}
          path: |
            '*/build/libs/'